name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Tag & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history required for conventional commits parsing

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      # Computes the next SemVer from conventional commits since the last tag.
      #
      # Bump rules (from commit messages merged via squash with conventional title):
      #   feat!: / BREAKING CHANGE: → major  (0.1.0 → 1.0.0)
      #   feat:                     → minor  (0.0.1 → 0.1.0)
      #   fix: / build: / chore:    → patch  (0.1.0 → 0.1.1)
      #
      # When no previous tag exists, initial_version is used as the base
      # before applying the bump. Set it to one version below the expected
      # first release so a feat: commit produces the desired initial tag.
      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          tag_prefix: v
          initial_version: 0.9.0   # feat: → v1.0.0 | fix: → v0.9.1 on first run

      - name: Print version decision
        run: |
          echo "Previous tag : ${{ steps.tag.outputs.previous_tag }}"
          echo "New version  : ${{ steps.tag.outputs.new_version }}"
          echo "New tag      : ${{ steps.tag.outputs.new_tag }}"
          echo "Bump type    : ${{ steps.tag.outputs.release_type }}"

      - name: Abort if no version change
        if: steps.tag.outputs.new_tag == steps.tag.outputs.previous_tag
        run: |
          echo "No releasable commits since last tag — skipping release."
          exit 0

      # The action is the single source of truth for the version.
      # gradle.properties holds a 0.0.0-SNAPSHOT placeholder in the repo;
      # the real version is injected here before every release build.
      - name: Inject release version into gradle.properties
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          sed -i "s/^version=.*/version=${VERSION}/" gradle.properties
          echo "gradle.properties set to version=${VERSION}"

      - name: Build & verify
        run: ./gradlew build koverVerify

      - name: Publish to GitHub Packages
        run: ./gradlew :tessera-core:publishMavenPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generateReleaseNotes: false
          makeLatest: true
