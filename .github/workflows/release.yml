name: Release

on:
  push:
    branches: [main]

# Only one release runs at a time. If a newer commit arrives while a release
# is in progress, the current run finishes — not cancelled — so the publish
# and tag always complete cleanly. The next queued run will then compute the
# version from the commits that arrived in the meantime.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Tag & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history required for conventional commits parsing

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      # Computes the next SemVer from conventional commits since the last tag.
      #
      # Bump rules (squash-merge PR title as conventional commit):
      #   feat!: / BREAKING CHANGE: → major  (0.1.0 → 1.0.0)
      #   feat:                     → minor  (0.0.1 → 0.1.0)
      #   fix: / build: / chore:    → patch  (0.1.0 → 0.1.1)
      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          tag_prefix: v

      - name: Print version decision
        run: |
          echo "Previous tag : ${{ steps.tag.outputs.previous_tag }}"
          echo "New version  : ${{ steps.tag.outputs.new_version }}"
          echo "New tag      : ${{ steps.tag.outputs.new_tag }}"
          echo "Bump type    : ${{ steps.tag.outputs.release_type }}"

      - name: Abort if no version change
        if: steps.tag.outputs.new_tag == steps.tag.outputs.previous_tag
        run: |
          echo "No releasable commits since last tag — skipping release."
          exit 0

      # Safety net: skip if the tag already exists (prevents 409 when two
      # workflow runs compute the same version concurrently before the first
      # one has created the tag).
      - name: Abort if tag already exists
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          if git tag --list | grep -qx "$TAG"; then
            echo "Tag $TAG already exists — this version was already released. Skipping."
            exit 0
          fi
          echo "Tag $TAG does not exist yet — proceeding with release."

      # The action is the single source of truth for the version.
      # All version references across the repo are updated atomically here.
      # The version bump commit is pushed to main only AFTER build and publish
      # succeed, so main is never left in a bumped-but-unreleased state.
      # [skip ci] in the commit message prevents this push from triggering
      # another release run — the actual loop-prevention mechanism.
      - name: Update version in all files
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          TAG="${{ steps.tag.outputs.new_tag }}"

          # Build configuration — version used by Gradle / Maven publish
          sed -i -E "s/^version=.*/version=${VERSION}/" gradle.properties

          # Landing page (docs/index.html) — hero badge, JitPack snippet, footer
          sed -i -E "s/v[0-9]+\.[0-9]+\.[0-9]+/${TAG}/g" docs/index.html

          # Root README — JitPack installation snippet
          sed -i -E "s/tessera-core-v[0-9]+\.[0-9]+\.[0-9]+/tessera-core-${TAG}/g" README.md

          # tessera-core README — JitPack snippet and GitHub Packages Maven coordinate
          sed -i -E "s/tessera-core-v[0-9]+\.[0-9]+\.[0-9]+/tessera-core-${TAG}/g" tessera-core/README.md
          sed -i -E "s/tessera-core:[0-9]+\.[0-9]+\.[0-9]+/tessera-core:${VERSION}/g" tessera-core/README.md

          echo "All version references updated to ${TAG} / ${VERSION}"

      - name: Stage version bump commit (local only)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties docs/index.html README.md tessera-core/README.md
          if git diff --cached --quiet; then
            echo "No file changes — nothing to commit."
          else
            git commit -m "chore: release ${{ steps.tag.outputs.new_tag }} [skip ci]"
            echo "Version bump committed locally."
          fi

      - name: Build & verify
        run: ./gradlew build koverVerify

      # GitHub Packages does not allow overwriting a published version (HTTP 409).
      # A previous run may have published the Maven artifact but failed before
      # creating the git tag, leaving the repo in a partially-released state.
      # Treating 409 as success lets the pipeline complete (tag + release) even
      # when the artifact was already uploaded by an earlier interrupted run.
      - name: Publish to GitHub Packages
        run: |
          set +e
          ./gradlew :tessera-core:publishMavenPublicationToGitHubPackagesRepository \
            2>&1 | tee /tmp/publish.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q "409" /tmp/publish.log; then
              echo "::warning::Version ${{ steps.tag.outputs.new_version }} is already present in GitHub Packages (HTTP 409)."
              echo "This means a previous run published the artifact but failed before creating the git tag."
              echo "Continuing to create the git tag and GitHub Release."
            else
              echo "::error::Publish failed with an unexpected error (not 409)."
              cat /tmp/publish.log
              exit 1
            fi
          else
            echo "Published dev.tessera:tessera-core:${{ steps.tag.outputs.new_version }} successfully."
          fi
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push only after build and publish succeed. [skip ci] in the commit
      # message prevents this push from triggering a new release workflow run.
      - name: Push version bump to main
        run: |
          if ! git diff --quiet HEAD origin/main; then
            git push origin main
            echo "Version bump pushed to main."
          else
            echo "Nothing to push."
          fi

      - name: Create git tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generateReleaseNotes: false
          makeLatest: true
