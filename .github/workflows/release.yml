name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Tag & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for conventional commits parsing

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # Determine next SemVer from conventional commits since last tag.
      # feat: → minor bump | fix:/build:/chore:/etc. → patch bump | feat!:/BREAKING CHANGE: → major bump
      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          tag_prefix: v

      - name: Abort if no version change
        if: steps.tag.outputs.new_tag == steps.tag.outputs.previous_tag
        run: |
          echo "No releasable commits since last tag — skipping release."
          exit 0

      # Strip the "v" prefix so Gradle gets "1.2.3" not "v1.2.3"
      - name: Set release version
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          sed -i "s/^version=.*/version=${VERSION}/" gradle.properties
          echo "Releasing version: ${VERSION}"

      - name: Build & test
        run: ./gradlew build koverVerify

      - name: Publish to GitHub Packages
        run: ./gradlew :tessera-core:publishMavenPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generateReleaseNotes: false
          makeLatest: true
