<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente principal: roxo → verde, igual ao site -->
    <linearGradient id="tesseraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b7cf6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    
    <!-- Gradiente mais escuro para tesserae menores -->
    <linearGradient id="tesseraGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    
    <!-- Sombra sutil -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background com cantos arredondados -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0f0a1f"/>
  
  <!-- Mosaico formando a letra T -->
  <!-- Barra horizontal superior do T -->
  <g filter="url(#softShadow)">
    <!-- Linha de cima do T (5 peças) -->
    <rect x="96" y="128" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="0.95"/>
    <rect x="160" y="128" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="1"/>
    <rect x="224" y="128" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="1"/>
    <rect x="288" y="128" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="1"/>
    <rect x="352" y="128" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="0.95"/>
    
    <!-- Segunda linha do topo (preenche o T mais grosso) -->
    <rect x="96" y="192" width="56" height="56" rx="8" fill="url(#tesseraGradientDark)" opacity="0.75"/>
    <rect x="160" y="192" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="0.85"/>
    <rect x="224" y="192" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="1"/>
    <rect x="288" y="192" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="0.85"/>
    <rect x="352" y="192" width="56" height="56" rx="8" fill="url(#tesseraGradientDark)" opacity="0.75"/>
    
    <!-- Haste vertical do T (3 peças centrais) -->
    <rect x="224" y="256" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="1"/>
    <rect x="224" y="320" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="0.95"/>
    <rect x="224" y="384" width="56" height="56" rx="8" fill="url(#tesseraGradient)" opacity="0.9"/>
  </g>
</svg>
